<!DOCTYPE html>
<html>

<head>
    <title>Random Number</title>
</head>

<body>

    <h2>Random Number:</h2>
    <p id="number"></p>

    <script>
        var randomNumber = Math.floor(Math.random() * 100) + 1; // 1 to 100
        document.getElementById("number").innerText = randomNumber;
    </script>

</body>

</html>
